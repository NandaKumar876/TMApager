monitoring:
  targets:
    - name: "Pager TMA Frontend"
      url: "http://localhost:5173"
      method: GET
      expected_status: 200
      timeout_s: 10
      interval_s: 60
      enabled: true

    - name: "WatchTower Health"
      url: "http://localhost:8000/health"
      method: GET
      expected_status: 200
      timeout_s: 10
      interval_s: 60
      enabled: true

log_sources: []

frontend:
  error_threshold: 10
  window_minutes: 5
  cooldown_minutes: 30

alerts:
  email: "akashiyu18@gmail.com, akash.krishnan.046@gmail.com"
  cooldown_minutes: 30

smtp:
  host: "${SMTP_HOST}"
  port: 587
  user: "${SMTP_USER}"
  password: "${SMTP_PASS}"
  from: "WatchTower Alerts <alerts@watchtower.dev>"
